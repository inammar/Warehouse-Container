name: .NET CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Take the code
        uses: actions/checkout@v4

      - name: Install .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet build
